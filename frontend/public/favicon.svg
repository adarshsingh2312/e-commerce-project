<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Premium Materio theme gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#692CF5" />
      <stop offset="50%" stop-color="#8C52FF" />
      <stop offset="100%" stop-color="#FF5E97" />
    </linearGradient>
    <linearGradient id="bag-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
  </defs>

  <!-- Clean rounded icon card -->
  <rect width="512" height="512" rx="140" fill="url(#bg-grad)" />

  <!-- Premium shopping bag handle -->
  <path d="M192,200 C192,130 320,130 320,200" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
  
  <!-- Shopping bag body -->
  <path d="M150,200 L362,200 C375,200 384,212 382,225 L352,425 C350,438 339,448 326,448 L186,448 C173,448 162,438 160,425 L130,225 C128,212 137,200 150,200 Z" fill="url(#bag-grad)" />

  <!-- Minimalist 'eM' branding on the bag surface -->
  <!-- Letter 'e' -->
  <path d="M210,335 C210,310 240,310 240,335 L210,335 C210,355 240,355 240,345" fill="none" stroke="#8C52FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Letter 'M' -->
  <path d="M258,355 L258,310 L280,335 L302,310 L302,355" fill="none" stroke="#8C52FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
</svg>